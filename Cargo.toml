[package]
name = "mcp-adjutant"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
home = "=0.5.9"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
